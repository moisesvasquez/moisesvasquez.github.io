<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TSC Production Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: oklch(96% 0.008 255);
    --card: oklch(99% 0.004 255);
    --card-tint: oklch(94% 0.012 255);
    --line: oklch(89% 0.012 255);
    --ink: oklch(23% 0.02 255);
    --muted: oklch(55% 0.02 255);
    --accent: oklch(60% 0.17 255);
    --accent-tint: oklch(93% 0.035 255);
    --danger: oklch(56% 0.19 25);
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Poppins',system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    position:relative;
    padding:22px 18px 40px;
  }

  /* topbar */
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:26px;}
  .logo-row{display:flex; align-items:center; gap:9px;}
  .logo-mark{width:28px; height:28px; border-radius:8px; background:var(--accent); position:relative; flex:0 0 auto;}
  .logo-mark::before, .logo-mark::after{content:""; position:absolute; left:5px; right:5px; height:3.5px; background:oklch(99% 0.004 255 / .6); border-radius:2px;}
  .logo-mark::before{top:7.5px;}
  .logo-mark::after{top:15px;}
  .logo-word{font-weight:700; font-size:15.5px; color:var(--ink); letter-spacing:.01em;}
  .logo-word span{color:var(--muted); font-weight:500;}
  .burger-btn{
    width:38px; height:38px; border-radius:11px;
    background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; color:var(--ink);
    cursor:pointer;
  }

  /* hero */
  .hero{margin-bottom:30px;}
  .hero h1{font-weight:800; font-size:32px; margin:0; line-height:1.05; color:var(--ink); letter-spacing:-0.01em;}
  .hero .meta{color:var(--muted); font-size:13.5px; margin-top:9px;}
  .hero .meta b{color:var(--accent); font-weight:700;}

  /* screens */
  .screen{display:none;}
  .screen.active{display:block; animation:fade .18s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  /* section groups */
  .group{margin-bottom:28px;}
  .group-label{
    display:flex; align-items:baseline; justify-content:space-between;
    font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); margin-bottom:10px; padding:0 2px;
  }
  .group-label b{color:var(--accent); font-weight:700; text-transform:none; letter-spacing:0; font-size:12.5px;}

  /* camera cluster */
  .cam-row{display:grid; gap:9px;}
  .cam-tile{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:14px 8px 12px; text-align:center; cursor:pointer;
  }
  .cam-tile .ci{font-size:19px; margin-bottom:6px;}
  .cam-tile .cn{font-size:11.5px; font-weight:600; line-height:1.2; color:var(--ink);}
  .cam-tile .cc{font-size:10.5px; color:var(--muted); margin-top:4px;}
  .cam-tile .cc.done{color:var(--accent); font-weight:700;}
  .cam-tile.done{background:var(--accent-tint); border-color:var(--accent);}

  /* row list (shared by Show Control / Audio / detail checklists) */
  .row-list{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .row-item{display:flex; align-items:center; gap:12px; padding:14px 15px; cursor:pointer; border-bottom:1px solid var(--line);}
  .row-item:last-child{border-bottom:none;}
  .row-item .ri-icon{width:34px; height:34px; border-radius:10px; background:var(--accent-tint); display:flex; align-items:center; justify-content:center; font-size:15px; flex:0 0 auto;}
  .row-item .ri-body{flex:1; min-width:0;}
  .row-item .ri-name{font-weight:600; font-size:14px; color:var(--ink);}
  .row-item .ri-count{font-size:11.5px; color:var(--muted); margin-top:1px;}
  .row-item .ri-count.done{color:var(--accent); font-weight:700;}
  .row-item .ri-dot{width:8px; height:8px; border-radius:50%; border:2px solid var(--line); flex:0 0 auto;}
  .row-item .ri-dot.done{background:var(--accent); border-color:var(--accent);}

  /* position detail */
  .backrow{display:flex; align-items:center; gap:10px; margin-bottom:18px; cursor:pointer;}
  .backrow .arrow{color:var(--accent); font-size:20px;}
  .backrow .lab{font-size:14px; color:var(--muted); font-weight:600;}
  .pos-title{font-weight:800; font-size:26px; color:var(--ink); margin-bottom:2px; line-height:1.1;}
  .pos-progress{color:var(--muted); font-size:13px; margin-bottom:18px;}
  .pos-progress b{color:var(--accent);}

  .card-list{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .item-row{display:flex; align-items:center; gap:13px; padding:15px 16px; cursor:pointer; border-bottom:1px solid var(--line);}
  .item-row:last-child{border-bottom:none;}
  .idx{width:25px; height:25px; border-radius:50%; background:var(--card-tint); color:var(--muted); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex:0 0 auto;}
  .idx .chk{display:none;}
  .item-row.toggled .idx{background:var(--accent); color:var(--card);}
  .item-row.toggled .idx .num{display:none;}
  .item-row.toggled .idx .chk{display:inline;}
  .txt{font-size:13.5px; line-height:1.4; color:var(--ink); flex:1; font-weight:400;}
  .item-row.toggled .txt{color:var(--muted); text-decoration:line-through; text-decoration-color:oklch(55% 0.02 255 / .5);}

  /* master view */
  .legend{display:flex; gap:16px; margin-bottom:16px;}
  .legend .lg{display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); font-weight:600;}
  .legend .dot{width:8px; height:8px; border-radius:50%;}
  .legend .dot.on{background:var(--accent);}
  .legend .dot.off{background:transparent; border:2px solid var(--line);}

  .m-group{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px 16px; margin-bottom:10px;}
  .m-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .m-head-left{display:flex; align-items:center; gap:9px;}
  .m-dot{width:8px; height:8px; border-radius:50%; background:var(--line); border:2px solid var(--line);}
  .m-dot.done{background:var(--accent); border-color:var(--accent);}
  .m-name{font-weight:600; font-size:14.5px; color:var(--ink);}
  .m-count{font-size:12px; font-weight:700; color:var(--muted);}
  .m-count.done{color:var(--accent);}
  .m-remaining{margin-top:8px; padding-top:8px; border-top:1px dashed var(--line);}
  .m-remaining .rline{font-size:12.5px; color:var(--muted); padding:3px 0; display:flex; gap:6px;}
  .m-remaining .rline::before{content:"•"; color:var(--accent);}
  .m-clear{font-size:13px; color:var(--accent); font-weight:600; padding-top:2px;}

  .wide-screen-title{font-weight:800; font-size:24px; color:var(--ink); margin-bottom:14px;}

  /* burger dropdown menu */
  .menu-panel{
    position:absolute; top:60px; right:18px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:7px;
    display:none;
    flex-direction:column;
    min-width:198px;
    z-index:50;
  }
  .menu-panel.open{display:flex;}
  .menu-item{padding:9px 11px; border-radius:8px; font-size:13.5px; cursor:pointer; color:var(--ink); font-weight:500;}
  .menu-item:hover{background:var(--card-tint);}
  .menu-item.danger{color:var(--danger);}
  .menu-divider{height:1px; background:var(--line); margin:4px 5px;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:var(--card);
    padding:10px 18px; border-radius:12px; font-size:13px;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
    z-index:60;
  }
  .toast.show{opacity:1;}

  /* loading / error states */
  .loading-state{
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:60px 20px; gap:16px;
    color:var(--muted); font-size:14px;
  }
  .spinner{
    width:28px; height:28px;
    border:3px solid var(--line);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-state{
    background:var(--card); border:1px solid var(--line);
    border-radius:var(--radius); padding:24px 20px;
    color:var(--muted); font-size:13.5px; line-height:1.7;
  }
  .error-state strong{color:var(--danger); display:block; margin-bottom:6px;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="logo-row">
      <div class="logo-mark"></div>
      <div class="logo-word">tsc <span>production</span></div>
    </div>
    <div class="burger-btn" onclick="toggleMenu()">☰</div>
  </div>

  <div class="hero">
    <h1>Sunday Morning</h1>
    <div class="meta" id="heroMeta">Loading checklist…</div>
  </div>

  <!-- all screens injected here by JS -->
  <div id="screens-root">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Loading from sheet…</span>
    </div>
  </div>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-item" onclick="goTo('home'); toggleMenu();">Home</div>
    <div class="menu-item" onclick="goTo('master'); toggleMenu();">Master View</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" id="resetBtn" onclick="handleResetClick()">Reset all checklists</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSFcIZzBYJbXuVrxe4l_INJK-m-9stjUe-9G9BsBdGtVQsOZclVBL0CSRRzZCzn_xjlPQp0wZ8lpqsc/pub?gid=0&single=true&output=csv';

// Display labels and stat-element IDs for each group key.
// Add new rows here if you ever create a new group in the sheet.
const GROUP_META = {
  cam:   { label: 'Cameras &amp; Switcher', statId: 'grp-cam' },
  show:  { label: 'ProPresenter &amp; Lights', statId: 'grp-show' },
  audio: { label: 'Audio', statId: 'grp-audio' },
};

// ── State ───────────────────────────────────────────────────
let POSITIONS = [];

// ── CSV parsing ─────────────────────────────────────────────
function parseCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const cleaned = text.replace(/^﻿/, ''); // strip BOM if present
  const lines = cleaned.trim().split(/\r?\n/);
  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  return lines.slice(1)
    .filter(l => l.trim())
    .map(line => {
      const vals = parseCSVLine(line);
      return Object.fromEntries(headers.map((h, i) => [h, (vals[i] || '').trim()]));
    });
}

// ── HTML escaping ────────────────────────────────────────────
function esc(s) {
  return (s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Build app from parsed CSV rows ───────────────────────────
function buildApp(rows) {
  // Aggregate rows into position objects
  const posMap = new Map();
  rows.forEach(r => {
    if (!r.position_id) return;
    if (!posMap.has(r.position_id)) {
      posMap.set(r.position_id, {
        id: r.position_id,
        name: r.position_name || r.position_id,
        tileLabel: r.tile_label || r.position_name || r.position_id,
        group: r.group || 'other',
        icon: r.icon || '📋',
        sort: parseInt(r.position_sort) || 99,
        tasks: []
      });
    }
    const taskNum = parseInt(r.task_number);
    if (r.task_text && !isNaN(taskNum)) {
      posMap.get(r.position_id).tasks.push({ num: taskNum, text: r.task_text });
    }
  });

  POSITIONS = [...posMap.values()].sort((a, b) => a.sort - b.sort);
  POSITIONS.forEach(p => p.tasks.sort((a, b) => a.num - b.num));

  // Inject all screens into the DOM
  const root = document.getElementById('screens-root');
  root.innerHTML = buildHomeHtml() + buildDetailScreensHtml() + buildMasterHtml();

  // Wire up local toggle clicks
  root.querySelectorAll('[can-toggle]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.shiftKey) return;
      el.classList.toggle('toggled');
    });
  });

  // Progress tracking via MutationObserver
  const obs = new MutationObserver(updateAllProgress);
  obs.observe(root, { attributes: true, attributeFilter: ['class'], subtree: true });
  setTimeout(updateAllProgress, 100);

  // Best-effort cross-device sync (works offline too — just degrades gracefully)
  import('https://unpkg.com/playhtml').then(({ playhtml }) => {
    playhtml.init({ room: 'tsc-sunday-production-checklist' });
  }).catch(() => {});
}

// ── Home screen HTML ─────────────────────────────────────────
function buildHomeHtml() {
  const groupOrder = [];
  const groups = {};
  POSITIONS.forEach(p => {
    if (!groups[p.group]) { groups[p.group] = []; groupOrder.push(p.group); }
    groups[p.group].push(p);
  });

  let sections = '';
  groupOrder.forEach(g => {
    const meta = GROUP_META[g] || { label: esc(g), statId: 'grp-' + g };
    const gPos = groups[g];
    let inner = '';

    if (g === 'cam') {
      // Camera tiles: 3-across for 3 items, 2-across otherwise
      const cols = gPos.length === 3 ? 3 : 2;
      inner = `<div class="cam-row" style="grid-template-columns:repeat(${cols},1fr)">` +
        gPos.map(p =>
          `<div class="cam-tile" id="tile-${p.id}" onclick="goTo('${p.id}')">
            <div class="ci">${p.icon}</div>
            <div class="cn">${esc(p.tileLabel)}</div>
            <div class="cc" id="count-${p.id}">0/0</div>
          </div>`
        ).join('') + `</div>`;
    } else {
      inner = `<div class="row-list">` +
        gPos.map(p =>
          `<div class="row-item" onclick="goTo('${p.id}')">
            <div class="ri-icon">${p.icon}</div>
            <div class="ri-body">
              <div class="ri-name">${esc(p.name)}</div>
              <div class="ri-count" id="count-${p.id}">0/0 done</div>
            </div>
            <div class="ri-dot" id="dot-${p.id}"></div>
          </div>`
        ).join('') + `</div>`;
    }

    sections += `<div class="group">
      <div class="group-label">${meta.label} <b id="${meta.statId}"></b></div>
      ${inner}
    </div>`;
  });

  return `<div class="screen active" id="screen-home">${sections}</div>`;
}

// ── Per-position detail screen HTML ──────────────────────────
function buildDetailScreensHtml() {
  return POSITIONS.map(p => {
    const tasks = p.tasks.map(t =>
      `<div id="${p.id}-${t.num}" can-toggle class="item-row">
        <span class="idx"><span class="num">${t.num}</span><span class="chk">✓</span></span>
        <span class="txt">${esc(t.text)}</span>
      </div>`
    ).join('');
    return `<div class="screen" id="screen-${p.id}">
      <div class="backrow" onclick="goTo('home')"><span class="arrow">←</span><span class="lab">All positions</span></div>
      <div class="pos-title">${esc(p.name)}</div>
      <div class="pos-progress" data-progress-for="${p.id}"></div>
      <div class="card-list" id="list-${p.id}">${tasks}</div>
    </div>`;
  }).join('');
}

// ── Master screen HTML (static shell, content rendered live) ─
function buildMasterHtml() {
  return `<div class="screen" id="screen-master">
    <div class="backrow" onclick="goTo('home')"><span class="arrow">←</span><span class="lab">All positions</span></div>
    <div class="wide-screen-title">Master View</div>
    <div class="legend">
      <div class="lg"><span class="dot on"></span>Complete</div>
      <div class="lg"><span class="dot off"></span>Remaining</div>
    </div>
    <div id="masterContent"></div>
  </div>`;
}

// ── Navigation ───────────────────────────────────────────────
function goTo(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + screenId);
  if (target) { target.classList.add('active'); window.scrollTo(0, 0); }
  if (screenId === 'master') renderMaster();
}

// ── Progress helpers ─────────────────────────────────────────
function getGroupStats(id) {
  const items = document.querySelectorAll('#list-' + id + ' [can-toggle]');
  let done = 0;
  items.forEach(el => { if (el.classList.contains('toggled')) done++; });
  return { total: items.length, done, items };
}

function updateAllProgress() {
  let grand = { done: 0, total: 0 };
  const bucket = {};

  POSITIONS.forEach(p => {
    if (!bucket[p.group]) bucket[p.group] = { done: 0, total: 0 };
    const { total, done } = getGroupStats(p.id);
    grand.done += done; grand.total += total;
    bucket[p.group].done += done; bucket[p.group].total += total;

    const allDone = total > 0 && done === total;

    const countEl = document.getElementById('count-' + p.id);
    if (countEl) {
      countEl.textContent = (p.group === 'cam') ? (done + '/' + total) : (done + '/' + total + ' done');
      countEl.classList.toggle('done', allDone);
    }
    const dotEl = document.getElementById('dot-' + p.id);
    if (dotEl) dotEl.classList.toggle('done', allDone);
    const tileEl = document.getElementById('tile-' + p.id);
    if (tileEl) tileEl.classList.toggle('done', allDone);
    const progEl = document.querySelector('[data-progress-for="' + p.id + '"]');
    if (progEl) progEl.innerHTML = '<b>' + done + ' of ' + total + '</b> complete';
  });

  Object.entries(bucket).forEach(([g, stats]) => {
    const el = document.getElementById((GROUP_META[g] || {}).statId || 'grp-' + g);
    if (el) el.textContent = stats.done + '/' + stats.total + ' ready';
  });

  const heroMeta = document.getElementById('heroMeta');
  if (heroMeta) heroMeta.innerHTML = '<b>' + grand.done + ' of ' + grand.total + '</b> tasks ready across the team';

  if (document.getElementById('screen-master')?.classList.contains('active')) renderMaster();
}

// ── Master view renderer ─────────────────────────────────────
function renderMaster() {
  const container = document.getElementById('masterContent');
  if (!container) return;
  container.innerHTML = POSITIONS.map(p => {
    const { total, done, items } = getGroupStats(p.id);
    const allDone = total > 0 && done === total;
    const remainingHtml = allDone
      ? '<div class="m-clear">All done ✓</div>'
      : '<div class="m-remaining">' +
          Array.from(items)
            .filter(el => !el.classList.contains('toggled'))
            .map(el => '<div class="rline">' + esc(el.querySelector('.txt').textContent) + '</div>')
            .join('') +
        '</div>';
    return `<div class="m-group">
      <div class="m-head">
        <div class="m-head-left">
          <span class="m-dot${allDone ? ' done' : ''}"></span>
          <span class="m-name">${esc(p.name)}</span>
        </div>
        <span class="m-count${allDone ? ' done' : ''}">${done}/${total}</span>
      </div>
      ${remainingHtml}
    </div>`;
  }).join('');
}

// ── Menu ─────────────────────────────────────────────────────
function toggleMenu() { document.getElementById('menuPanel').classList.toggle('open'); }

document.addEventListener('click', e => {
  const panel = document.getElementById('menuPanel');
  const burger = document.querySelector('.burger-btn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== burger) {
    panel.classList.remove('open');
    resetConfirmState = false;
    document.getElementById('resetBtn').textContent = 'Reset all checklists';
  }
});

let resetConfirmState = false, resetConfirmTimer = null;
function handleResetClick() {
  const btn = document.getElementById('resetBtn');
  if (!resetConfirmState) {
    resetConfirmState = true;
    btn.textContent = 'Tap again to confirm';
    resetConfirmTimer = setTimeout(() => {
      resetConfirmState = false;
      btn.textContent = 'Reset all checklists';
    }, 5000);
  } else {
    clearTimeout(resetConfirmTimer);
    resetConfirmState = false;
    btn.textContent = 'Reset all checklists';
    resetAllChecklists();
    document.getElementById('menuPanel').classList.remove('open');
  }
}

function resetAllChecklists() {
  document.querySelectorAll('[can-toggle]').forEach(el => {
    if (el.classList.contains('toggled')) {
      el.classList.remove('toggled');
      // shift-click notifies playhtml of the reset without re-toggling locally
      el.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true, shiftKey: true }));
    }
  });
  showToast('Cleared for next Sunday');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Bootstrap ────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('Sheet returned no rows');
    buildApp(rows);
  } catch (err) {
    document.getElementById('screens-root').innerHTML =
      `<div class="error-state">
        <strong>Could not load checklist</strong>
        Could not fetch the Google Sheet (${esc(err.message)}).<br><br>
        Make sure the sheet is published to the web via File → Share → Publish to web, then reload.
      </div>`;
    document.getElementById('heroMeta').textContent = 'Sheet unavailable';
  }
}

init();
</script>
</body>
</html>
